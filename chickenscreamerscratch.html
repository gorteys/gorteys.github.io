<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Screamer (scratch)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #2d1b00, #4a2810);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(255, 200, 100, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            max-width: 900px;
            width: 100%;
            border: 2px solid #ff9900;
            position: relative;
        }
        .container::before {
            content: "🐔";
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 48px;
            transform: rotate(15deg);
            filter: drop-shadow(0 5px 15px rgba(255, 150, 0, 0.5));
        }
        h1 {
            color: #ffcc00;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 150, 0, 0.4), 0 4px 0 #7a3b00;
            font-size: 2.2rem;
            word-break: break-word;
        }
        h1 small {
            display: block;
            font-size: 1rem;
            color: #ffaa33;
            text-shadow: none;
            font-weight: 300;
            letter-spacing: 5px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* КНОПКИ МИКРОФОНА */
        .mic-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .mic-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .mic-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .mic-btn:active {
            transform: scale(0.95);
        }
        .mic-btn.allow {
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #fff;
        }
        .mic-btn.allow:hover {
            background: linear-gradient(135deg, #00e676, #69f0ae);
        }
        .mic-btn.deny {
            background: linear-gradient(135deg, #d50000, #ff1744);
            color: #fff;
        }
        .mic-btn.deny:hover {
            background: linear-gradient(135deg, #ff1744, #ff5252);
        }
        .mic-status {
            color: #ffcc80;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.8;
            min-height: 22px;
        }
        .mic-status .granted { color: #69f0ae; }
        .mic-status .denied { color: #ff5252; }

        .scratch-wrapper {
            position: relative;
            overflow: hidden;
            padding-bottom: 75%;
            height: 0;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(255, 150, 0, 0.3), inset 0 0 30px rgba(255, 100, 0, 0.1);
            border: 3px solid #ff8800;
        }
        .scratch-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #1a0e00;
        }
        .footer {
            color: rgba(255, 200, 100, 0.6);
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer a {
            color: #ffaa33;
            text-decoration: none;
            transition: 0.3s;
            border-bottom: 1px dashed transparent;
        }
        .footer a:hover {
            color: #ffdd77;
            border-bottom-color: #ffaa33;
        }
        .chicken-stamp {
            text-align: center;
            margin-top: 15px;
            font-size: 28px;
            letter-spacing: 10px;
            opacity: 0.4;
            user-select: none;
        }

        /* Перезагрузка iframe */
        .reload-hint {
            color: rgba(255,200,100,0.3);
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            h1 { font-size: 1.6rem; }
            h1 small { font-size: 0.8rem; }
            .container::before { font-size: 32px; top: -10px; right: -10px; }
            .mic-btn { padding: 8px 18px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🐔 CHICKEN SCREAMER
            <small>scratch project</small>
        </h1>

        <!-- УПРАВЛЕНИЕ МИКРОФОНОМ -->
        <div class="mic-controls">
            <button class="mic-btn allow" id="allowMic">🎤 Разрешить</button>
            <button class="mic-btn deny" id="denyMic">🔇 Запретить</button>
        </div>
        <div class="mic-status" id="micStatus">⚡ Нажмите "Разрешить" для доступа к микрофону</div>

        <div class="scratch-wrapper" id="scratchWrapper">
            <iframe 
                id="scratchFrame"
                src="https://scratch.mit.edu/projects/embed/865578133/" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="footer">
            <a href="https://scratch.mit.edu/projects/865578133" target="_blank">🔗 Открыть на Scratch</a>
            <span style="color:rgba(255,200,100,0.3);">|</span>
            <span style="color:rgba(255,200,100,0.4);">🐣 v1.0</span>
        </div>
        <div class="chicken-stamp">
            🐓 🐥 🐔
        </div>
        <div class="reload-hint">⏳ При смене разрешения игра перезагружается</div>
    </div>

    <script>
        const frame = document.getElementById('scratchFrame');
        const statusDiv = document.getElementById('micStatus');

        // Функция перезагрузки iframe (с сохранением ссылки)
        function reloadFrame() {
            const src = frame.src;
            frame.src = '';
            setTimeout(() => {
                frame.src = src;
            }, 150);
        }

        // Функция обновления статуса
        function updateStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = 'mic-status' + (type ? ' ' + type : '');
        }

        // РАЗРЕШИТЬ микрофон
        document.getElementById('allowMic').addEventListener('click', async function() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Если дошли сюда — доступ есть
                stream.getTracks().forEach(track => track.stop()); // останавливаем, чтобы не занимать
                updateStatus('✅ Микрофон РАЗРЕШЁН! Игра перезагружается...', 'granted');
                reloadFrame();
            } catch (err) {
                console.warn('Ошибка доступа к микрофону:', err);
                updateStatus('❌ Не удалось получить доступ. Проверьте настройки браузера.', 'denied');
                // Всё равно перезагружаем, чтобы сбросить состояние
                reloadFrame();
            }
        });

        // ЗАПРЕТИТЬ микрофон (отключаем через перезагрузку без разрешения)
        document.getElementById('denyMic').addEventListener('click', function() {
            // Просто перезагружаем — если доступ уже был, браузер сбросит его для iframe
            updateStatus('🔇 Микрофон ЗАПРЕЩЁН. Игра перезагружается...', 'denied');
            reloadFrame();
            // Дополнительно пробуем "отобрать" доступ у страницы, если он был
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                // Просто заглушка — фактически отозвать разрешение нельзя, 
                // но перезагрузка iframe сбросит его состояние
            }
        });

        // При загрузке страницы проверяем, был ли уже дан доступ (для информации)
        async function checkMicPermission() {
            if (!navigator.permissions || !navigator.permissions.query) {
                return; // не все браузеры поддерживают
            }
            try {
                const result = await navigator.permissions.query({ name: 'microphone' });
                if (result.state === 'granted') {
                    updateStatus('✅ Микрофон уже РАЗРЕШЁН (в браузере)', 'granted');
                } else if (result.state === 'denied') {
                    updateStatus('❌ Микрофон ЗАПРЕЩЁН (в браузере)', 'denied');
                } else {
                    updateStatus('⚡ Статус микрофона: будет запрошен при нажатии', '');
                }
            } catch (e) {
                // тихо игнорируем
            }
        }
        checkMicPermission();
    </script>
</body>
</html
