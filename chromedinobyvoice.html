<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Dino by Voice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
            overflow: hidden;
        }
        .game-wrapper {
            background: #2d2d44;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            border: 2px solid #4a4a6a;
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }
        h1 small {
            display: block;
            font-size: 14px;
            color: #8888aa;
            font-weight: 300;
            margin-top: 5px;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #f7f7f7;
            border-radius: 16px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            height: auto;
            border: 3px solid #555577;
            cursor: pointer;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .mic-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .mic-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .mic-btn.allow {
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #fff;
        }
        .mic-btn.deny {
            background: linear-gradient(135deg, #d50000, #ff1744);
            color: #fff;
        }
        .mic-btn.voice-active {
            background: linear-gradient(135deg, #ff6d00, #ff9100);
            color: #fff;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        .status {
            color: #aaaacc;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 24px;
        }
        .status .active { color: #69f0ae; }
        .status .error { color: #ff5252; }
        .status .listening { color: #ffab40; }
        .commands {
            color: #666688;
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .commands span {
            display: inline-block;
            background: #3a3a55;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 3px 5px;
            color: #aaaacc;
        }
        @media (max-width: 600px) {
            .game-wrapper { padding: 15px; }
            h1 { font-size: 20px; }
            .mic-btn { padding: 10px 20px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>
            🦕 CHROME DINO
            <small>by Voice Control</small>
        </h1>

        <canvas id="gameCanvas" width="800" height="300"></canvas>

        <div class="controls">
            <button class="mic-btn allow" id="allowMic">🎤 Включить микрофон</button>
            <button class="mic-btn deny" id="denyMic">🔇 Выключить</button>
        </div>

        <div class="status" id="status">⚡ Нажмите «Включить микрофон» и скажите «Прыжок»</div>
        <div class="commands">
            <span>🗣️ «Прыжок» → прыгнуть</span>
            <span>🗣️ «Вперёд» → ускориться</span>
            <span>🗣️ «Стоп» → остановиться</span>
        </div>
    </div>

    <script>
        // ========== ИГРОВАЯ ЛОГИКА ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        // Персонаж
        const dino = {
            x: 60,
            y: 200,
            width: 40,
            height: 50,
            vy: 0,
            gravity: 0.8,
            jumpPower: -14,
            grounded: true,
            speed: 4,
            legFrame: 0,
            legTimer: 0
        };

        // Препятствия
        let obstacles = [];
        let score = 0;
        let gameOver = false;
        let gameSpeed = 4;
        let frameCount = 0;
        let isRunning = true;

        // Голосовое управление
        let recognition = null;
        let isListening = false;
        let voiceCommand = '';

        // Земля
        const groundY = 250;

        // ========== РИСОВАНИЕ ==========
        function drawDino() {
            const d = dino;
            // Тело
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(d.x, d.y, d.width, d.height);
            
            // Глаз
            ctx.fillStyle = 'white';
            ctx.fillRect(d.x + 28, d.y + 8, 8, 8);
            ctx.fillStyle = 'black';
            ctx.fillRect(d.x + 32, d.y + 10, 4, 4);
            
            // Рот
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(d.x + 28, d.y + 22, 10, 3);
            
            // Ноги (анимация бега)
            ctx.fillStyle = '#1a1a1a';
            if (isRunning && d.grounded) {
                d.legTimer++;
                if (d.legTimer > 10) {
                    d.legTimer = 0;
                    d.legFrame = (d.legFrame + 1) % 2;
                }
                if (d.legFrame === 0) {
                    ctx.fillRect(d.x + 5, d.y + d.height, 8, 12);
                    ctx.fillRect(d.x + 20, d.y + d.height, 8, 8);
                } else {
                    ctx.fillRect(d.x + 5, d.y + d.height, 8, 8);
                    ctx.fillRect(d.x + 20, d.y + d.height, 8, 12);
                }
            } else {
                ctx.fillRect(d.x + 5, d.y + d.height, 8, 10);
                ctx.fillRect(d.x + 20, d.y + d.height, 8, 10);
            }
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.fillStyle = '#2d2d2d';
                if (obs.type === 'cactus') {
                    // Кактус
                    ctx.fillRect(obs.x, obs.y, 12, obs.height);
                    ctx.fillRect(obs.x - 8, obs.y + 10, 8, 15);
                    ctx.fillRect(obs.x + 12, obs.y + 5, 8, 12);
                } else {
                    // Птица
                    ctx.fillStyle = '#444';
                    ctx.fillRect(obs.x, obs.y, 20, 10);
                    ctx.fillRect(obs.x - 8, obs.y - 5, 8, 20);
                    ctx.fillRect(obs.x + 20, obs.y - 5, 8, 20);
                }
            });
        }

        function drawGround() {
            ctx.fillStyle = '#ddd';
            ctx.fillRect(0, groundY, canvas.width, 50);
            ctx.fillStyle = '#bbb';
            for (let i = 0; i < canvas.width; i += 30) {
                const offset = (frameCount * gameSpeed) % 30;
                ctx.fillRect(i - offset, groundY + 5, 10, 3);
            }
        }

        function drawScore() {
            ctx.fillStyle = '#555';
            ctx.font = '20px "Courier New", monospace';
            ctx.fillText(`Счёт: ${Math.floor(score)}`, 680, 40);
            if (gameOver) {
                ctx.fillStyle = '#d32f2f';
                ctx.font = 'bold 40px "Courier New", monospace';
                ctx.fillText('GAME OVER', 280, 150);
                ctx.font = '16px "Courier New", monospace';
                ctx.fillStyle = '#888';
                ctx.fillText('Нажмите пробел или скажите "Играть"', 290, 190);
            }
        }

        // ========== ОБНОВЛЕНИЕ ИГРЫ ==========
        function update() {
            if (gameOver) return;

            frameCount++;
            
            // Движение динозавра
            if (!dino.grounded) {
                dino.vy += dino.gravity;
                dino.y += dino.vy;
            }

            // Проверка земли
            if (dino.y + dino.height >= groundY) {
                dino.y = groundY - dino.height;
                dino.vy = 0;
                dino.grounded = true;
            }

            // Движение вперёд (голосовая команда)
            if (isRunning) {
                score += gameSpeed * 0.1;
            }

            // Генерация препятствий
            if (frameCount % Math.max(60, 120 - gameSpeed * 5) === 0 && obstacles.length < 3) {
                const type = Math.random() > 0.7 ? 'bird' : 'cactus';
                if (type === 'bird') {
                    obstacles.push({
                        x: canvas.width,
                        y: 180 + Math.random() * 40,
                        width: 20,
                        height: 10,
                        type: 'bird'
                    });
                } else {
                    obstacles.push({
                        x: canvas.width,
                        y: groundY - 40 - Math.random() * 20,
                        width: 12,
                        height: 40 + Math.random() * 20,
                        type: 'cactus'
                    });
                }
            }

            // Обновление препятствий
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;
            });
            obstacles = obstacles.filter(obs => obs.x > -50);

            // Проверка столкновений
            obstacles.forEach(obs => {
                if (dino.x < obs.x + obs.width &&
                    dino.x + dino.width > obs.x &&
                    dino.y < obs.y + obs.height &&
                    dino.y + dino.height > obs.y) {
                    gameOver = true;
                    isRunning = false;
                }
            });

            // Увеличение скорости
            if (frameCount % 300 === 0 && gameSpeed < 12) {
                gameSpeed += 0.5;
            }
        }

        // ========== ПРЫЖОК ==========
        function jump() {
            if (dino.grounded && !gameOver) {
                dino.vy = dino.jumpPower;
                dino.grounded = false;
                isRunning = true;
                voiceCommand = 'Прыжок!';
                setTimeout(() => { voiceCommand = ''; }, 500);
            }
        }

        // ========== ПЕРЕЗАПУСК ==========
        function restart() {
            gameOver = false;
            isRunning = true;
            gameSpeed = 4;
            score = 0;
            obstacles = [];
            dino.y = groundY - dino.height;
            dino.vy = 0;
            dino.grounded = true;
            frameCount = 0;
            statusDiv.innerHTML = '🔄 Игра перезапущена!';
            setTimeout(() => {
                statusDiv.innerHTML = '🎤 Скажите "Прыжок" или "Вперёд"';
            }, 1000);
        }

        // ========== ГОЛОСОВОЕ УПРАВЛЕНИЕ ==========
        function initVoice() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                statusDiv.innerHTML = '❌ Ваш браузер не поддерживает распознавание речи';
                statusDiv.className = 'status error';
                return false;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = function(event) {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript.toLowerCase().trim();
                    
                    if (event.results[i].isFinal) {
                        console.log('Распознано:', transcript);
                        
                        if (transcript.includes('прыжок') || transcript.includes('прыгать')) {
                            jump();
                            statusDiv.innerHTML = '🦘 Прыжок!';
                            statusDiv.className = 'status listening';
                            setTimeout(() => {
                                statusDiv.innerHTML = '🎤 Слушаю...';
                            }, 500);
                        }
                        else if (transcript.includes('вперёд') || transcript.includes('беги') || transcript.includes('бежать')) {
                            isRunning = true;
                            statusDiv.innerHTML = '🏃 Бежим вперёд!';
                            statusDiv.className = 'status listening';
                            setTimeout(() => {
                                statusDiv.innerHTML = '🎤 Слушаю...';
                            }, 500);
                        }
                        else if (transcript.includes('стоп') || transcript.includes('стой') || transcript.includes('останов')) {
                            isRunning = false;
                            statusDiv.innerHTML = '✋ Остановились!';
                            statusDiv.className = 'status listening';
                            setTimeout(() => {
                                statusDiv.innerHTML = '🎤 Слушаю...';
                            }, 500);
                        }
                        else if (transcript.includes('играть') || transcript.includes('снова') || transcript.includes('рестарт')) {
                            if (gameOver) {
                                restart();
                            }
                        }
                    }
                }
            };

            recognition.onerror = function(event) {
                console.error('Ошибка распознавания:', event.error);
                if (event.error === 'not-allowed') {
                    statusDiv.innerHTML = '❌ Доступ к микрофону запрещён! Разрешите в браузере.';
                    statusDiv.className = 'status error';
                } else if (event.error === 'no-speech') {
                    statusDiv.innerHTML = '🔇 Ничего не слышно... Скажите команду';
                    statusDiv.className = 'status';
                }
            };

            recognition.onend = function() {
                if (isListening) {
                    recognition.start();
                }
            };

            return true;
        }

        // ========== УПРАВЛЕНИЕ МИКРОФОНОМ ==========
        document.getElementById('allowMic').addEventListener('click', async function() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());

                if (!recognition) {
                    if (!initVoice()) return;
                }

                isListening = true;
                recognition.start();
                this.classList.add('voice-active');
                this.textContent = '🎤 Микрофон ВКЛ';
                statusDiv.innerHTML = '🎤 Слушаю... Скажите "Прыжок" или "Вперёд"';
                statusDiv.className = 'status listening';
                
                // Разблокируем аудио на странице
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                
            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);
                statusDiv.innerHTML = '❌ Не удалось получить доступ к микрофону';
                statusDiv.className = 'status error';
            }
        });

        document.getElementById('denyMic').addEventListener('click', function() {
            if (recognition) {
                isListening = false;
                recognition.stop();
            }
            document.getElementById('allowMic').classList.remove('voice-active');
            document.getElementById('allowMic').textContent = '🎤 Включить микрофон';
            statusDiv.innerHTML = '🔇 Микрофон выключен';
            statusDiv.className = 'status';
        });

        // ========== УПРАВЛЕНИЕ С КЛАВИАТУРЫ ==========
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameOver) {
                    restart();
                } else {
                    jump();
                }
            }
            if (e.key === 'r' || e.key === 'R') {
                if (gameOver) restart();
            }
        });

        // ========== ЦИКЛ ИГРЫ ==========
        function gameLoop() {
            update();
            
            // Отрисовка
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Фон
            ctx.fillStyle = '#f7f7f7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Облака
            ctx.fillStyle = 'rgba(200,200,200,0.3)';
            for (let i = 0; i < 3; i++) {
                const x = (i * 300 + frameCount * 0.2) % 900 - 100;
                ctx.beginPath();
                ctx.arc(x, 40 + i * 30, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 40, 30 + i * 30, 25, 0, Math.PI * 2);
                ctx.fill();
            }
            
            drawGround();
            drawObstacles();
            drawDino();
            drawScore();

            // Отображение голосовой команды
            if (voiceCommand) {
                ctx.fillStyle = '#4caf50';
                ctx.font = 'bold 24px "Courier New", monospace';
                ctx.fillText(voiceCommand, 320, 80);
            }

            requestAnimationFrame(gameLoop);
        }

        // ========== ЗАПУСК ==========
        // Инициализация распознавания при загрузке
        initVoice();
        
        // Автозапуск игры
        statusDiv.innerHTML = '🎤 Нажмите «Включить микрофон» и скажите «Прыжок»';
        gameLoop();

        // Обработка клика по canvas для фокуса клавиатуры
        canvas.addEventListener('click', () => {
            if (gameOver) restart();
            else jump();
        });

        console.log('🦕 Chrome Dino by Voice загружен!');
        console.log('Команды: "Прыжок", "Вперёд", "Стоп", "Играть" (при Game Over)');
    </script>
</body>
</html>
