<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Bear Adventure: Browser Editions</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 28px 24px 40px;
            max-width: 820px;
            width: 100%;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.15);
            transition: all 0.2s;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #f9e7b3;
            text-shadow: 0 4px 0 #7a4f2b, 0 8px 12px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 12px;
            word-break: break-word;
            line-height: 1.1;
        }

        .subhead {
            text-align: center;
            color: #d4d9b0;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 20px;
            opacity: 0.9;
            letter-spacing: 0.3px;
            border-bottom: 1px dashed rgba(255,255,200,0.25);
            padding-bottom: 12px;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
        }

        .control-group {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .control-label {
            color: #d4d9b0;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            opacity: 0.8;
            min-width: 80px;
        }

        .lang-btn, .mode-btn {
            background: #2f4d3a;
            border: none;
            border-radius: 60px;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 700;
            color: #b6ccaa;
            box-shadow: 0 4px 0 #17291e, 0 6px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.1s ease;
            letter-spacing: 0.5px;
            flex: 0 1 auto;
            min-width: 100px;
            border: 1px solid rgba(255, 255, 180, 0.1);
        }

        .lang-btn.active, .mode-btn.active {
            background: #f5d98f;
            color: #1d3a28;
            box-shadow: 0 4px 0 #9f7a3f, 0 8px 16px rgba(0,0,0,0.5);
            border-color: #ffeaaf;
            transform: scale(1.02);
        }

        .lang-btn:active, .mode-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #17291e;
        }

        .player-wrapper {
            background: #0f1f15;
            border-radius: 32px;
            padding: 12px;
            box-shadow: inset 0 0 0 2px #3f604a, 0 20px 30px -8px black;
            margin-top: 6px;
        }

        .player-label {
            text-align: center;
            color: #eedb9b;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #1e2a1e;
        }

        .footer-note {
            margin-top: 18px;
            text-align: center;
            font-size: 0.85rem;
            color: #9bb492;
            letter-spacing: 0.3px;
            opacity: 0.8;
            font-weight: 400;
        }

        .footer-note a {
            color: #eedb9b;
            text-decoration: none;
            border-bottom: 1px dotted #7a966b;
        }

        @media (max-width: 500px) {
            .card { padding: 16px 12px 28px; }
            h1 { font-size: 1.8rem; }
            .lang-btn, .mode-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
                min-width: 80px;
            }
            .iframe-container { padding-bottom: 75%; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🐻 Super Bear Adventure:<br>Browser Editions</h1>
        <div class="subhead" id="subheadText">✦ choose language & mode / выбери язык и режим ✦</div>

        <div class="controls-section">
            <!-- Выбор языка -->
            <div class="control-group">
                <span class="control-label">🌐 Language</span>
                <button class="lang-btn" data-lang="enus" id="btnLangEn">🇺🇸 EnUs</button>
                <button class="lang-btn active" data-lang="ruru" id="btnLangRu">🇷🇺 RuRu</button>
            </div>

            <!-- Выбор режима -->
            <div class="control-group">
                <span class="control-label">🎮 Mode</span>
                <button class="mode-btn active" data-mode="multiplayer" id="btnModeMulti">👥 Multi (3)</button>
                <button class="mode-btn" data-mode="oneplayer" id="btnModeOne">🧸 One (1)</button>
            </div>
        </div>

        <!-- ОДИН плеер (меняется в зависимости от режима) -->
        <div class="player-wrapper">
            <div class="player-label" id="playerLabel">🎮 Multiplayer (3 players)</div>
            <div class="iframe-container">
                <iframe id="gameFrame"
                    src="https://scratch.mit.edu/projects/embed/1350793976/" 
                    allowfullscreen
                    loading="lazy"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                    title="Super Bear Adventure">
                </iframe>
            </div>
        </div>

        <div class="footer-note">
            ⚡ Super Bear Adventure · <a href="#" onclick="event.preventDefault()">Browser Editions</a>
        </div>
    </div>

    <script>
        (function() {
            // Плеер
            const gameFrame = document.getElementById('gameFrame');
            const playerLabel = document.getElementById('playerLabel');
            const subheadText = document.getElementById('subheadText');

            // Кнопки языка
            const btnLangEn = document.getElementById('btnLangEn');
            const btnLangRu = document.getElementById('btnLangRu');
            const langBtns = [btnLangEn, btnLangRu];

            // Кнопки режима
            const btnModeMulti = document.getElementById('btnModeMulti');
            const btnModeOne = document.getElementById('btnModeOne');
            const modeBtns = [btnModeMulti, btnModeOne];

            // Тексты на двух языках
            const TEXTS = {
                enus: {
                    subhead: '✦ choose language & mode ✦',
                    multiplayer: '🎮 Multiplayer (3 players)',
                    oneplayer: '🎮 Oneplayer (1 player)',
                    modeMulti: '👥 Multi (3)',
                    modeOne: '🧸 One (1)',
                    langEn: '🇺🇸 EnUs',
                    langRu: '🇷🇺 RuRu'
                },
                ruru: {
                    subhead: '✦ выбери язык и режим ✦',
                    multiplayer: '🎮 Мультиплеер (3 игрока)',
                    oneplayer: '🎮 Один игрок (1)',
                    modeMulti: '👥 Мульти (3)',
                    modeOne: '🧸 Один (1)',
                    langEn: '🇺🇸 EnUs',
                    langRu: '🇷🇺 RuRu'
                }
            };

            // Ссылки на плееры - как вы просили (поменяны местами)
            const PLAYERS = {
                multiplayer: 'https://scratch.mit.edu/projects/embed/1350793976/',
                oneplayer: 'https://scratch.mit.edu/projects/embed/1350650663/'
            };

            let currentLang = 'ruru';   // по умолчанию русский
            let currentMode = 'multiplayer'; // по умолчанию мультиплеер

            // Функция обновления интерфейса
            function updateUI() {
                const texts = TEXTS[currentLang];

                // Обновляем подзаголовок
                subheadText.textContent = texts.subhead;

                // Обновляем надпись плеера
                if (currentMode === 'multiplayer') {
                    playerLabel.textContent = texts.multiplayer;
                } else {
                    playerLabel.textContent = texts.oneplayer;
                }

                // Обновляем текст на кнопках языка
                btnLangEn.textContent = texts.langEn;
                btnLangRu.textContent = texts.langRu;

                // Обновляем текст на кнопках режима
                btnModeMulti.textContent = texts.modeMulti;
                btnModeOne.textContent = texts.modeOne;

                // Обновляем src плеера
                gameFrame.src = PLAYERS[currentMode];
            }

            // Функция установки языка
            function setLanguage(lang) {
                currentLang = lang;
                langBtns.forEach(btn => btn.classList.remove('active'));
                if (lang === 'enus') btnLangEn.classList.add('active');
                else btnLangRu.classList.add('active');
                updateUI();
                try { localStorage.setItem('bearLang', lang); } catch(e) {}
            }

            // Функция установки режима
            function setMode(mode) {
                currentMode = mode;
                modeBtns.forEach(btn => btn.classList.remove('active'));
                if (mode === 'multiplayer') btnModeMulti.classList.add('active');
                else btnModeOne.classList.add('active');
                updateUI();
                try { localStorage.setItem('bearMode', mode); } catch(e) {}
            }

            // Обработчики языка
            btnLangEn.addEventListener('click', function(e) {
                e.preventDefault();
                setLanguage('enus');
            });
            btnLangRu.addEventListener('click', function(e) {
                e.preventDefault();
                setLanguage('ruru');
            });

            // Обработчики режима
            btnModeMulti.addEventListener('click', function(e) {
                e.preventDefault();
                setMode('multiplayer');
            });
            btnModeOne.addEventListener('click', function(e) {
                e.preventDefault();
                setMode('oneplayer');
            });

            // Восстановление сохранённых настроек
            try {
                const savedLang = localStorage.getItem('bearLang');
                if (savedLang === 'enus' || savedLang === 'ruru') {
                    currentLang = savedLang;
                }
                const savedMode = localStorage.getItem('bearMode');
                if (savedMode === 'multiplayer' || savedMode === 'oneplayer') {
                    currentMode = savedMode;
                }
            } catch(e) {}

            // Применяем настройки
            setLanguage(currentLang);
            setMode(currentMode);

        })();
    </script>
</body>
</html>
