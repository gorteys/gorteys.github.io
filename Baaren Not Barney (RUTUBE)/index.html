<!DOCTYPE html>

    RUTUBE STYLE VIDEO SITE

<div class="container">

        <!-- ВАШЕ ВИДЕО -->
        <iframe src="https://rutube.ru/play/embed/5e20182ee43d270f577934774da2ad2a/"

            Баарен Не Барни
