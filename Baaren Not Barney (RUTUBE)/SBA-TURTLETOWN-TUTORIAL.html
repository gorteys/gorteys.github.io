<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Bear Adventure - Видео</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: #161b22;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #30363d;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #f0f6fc;
            line-height: 1.3;
        }

        .subtitle {
            color: #8b949e;
            font-size: 16px;
            margin-bottom: 25px;
            border-left: 3px solid #58a6ff;
            padding-left: 15px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 25px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .lang-switcher {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .lang-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
        }

        .lang-btn.active {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
            box-shadow: 0 0 15px rgba(35, 134, 54, 0.3);
        }

        .lang-btn.active:hover {
            background: #2ea043;
        }

        .description {
            background: #0d1117;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            margin-top: 5px;
            line-height: 1.7;
            font-size: 16px;
            color: #c9d1d9;
        }

        .description strong {
            color: #f0f6fc;
        }

        .footer-note {
            margin-top: 20px;
            color: #484f58;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid #21262d;
            padding-top: 18px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 18px;
            }
            h1 {
                font-size: 22px;
            }
            .lang-btn {
                padding: 8px 18px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Заголовок (меняется) -->
        <h1 id="mainTitle">Прохождение Черепахограда Super Bear Adventure</h1>
        <div class="subtitle" id="subtitleText">🎮 Полное прохождение уровня</div>

        <!-- Видео -->
        <div class="video-wrapper">
            <iframe 
                src="https://rutube.ru/video/embed/37d8520d5f1f2ab412d49aa1a2f73ce2/" 
                allowfullscreen
                allow="autoplay; encrypted-media"
                loading="lazy">
            </iframe>
        </div>

        <!-- Кнопки переключения языка -->
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="ru">🇷🇺 Русский</button>
            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>

        <!-- Описание (меняется) -->
        <div class="description" id="descriptionText">
            <strong>📌 Описание:</strong><br>
            В этом видео мы проходим уровень <strong>«Черепахоград»</strong> в игре Super Bear Adventure. 
            Смотрим, собираем монеты, находим секреты и проходим сложные участки. 
            Приятного просмотра!
        </div>

        <div class="footer-note">
            🐻 Super Bear Adventure · Видео с Rutube
        </div>
    </div>

    <script>
        // === ДАННЫЕ ДЛЯ РУССКОГО И АНГЛИЙСКОГО ===
        const content = {
            ru: {
                title: 'Прохождение Черепахограда Super Bear Adventure',
                subtitle: '🎮 Полное прохождение уровня',
                description: `<strong>📌 Описание:</strong><br>
                    В этом видео мы проходим уровень <strong>«Черепахоград»</strong> в игре Super Bear Adventure. 
                    Смотрим, собираем монеты, находим секреты и проходим сложные участки. 
                    Приятного просмотра!`
            },
            en: {
                title: 'Tutorial Tutletown of the Super Bear Adventure',
                subtitle: '🎮 Full walkthrough of the level',
                description: `<strong>📌 Description:</strong><br>
                    In this video, we play through the <strong>«Tutletown»</strong> level in Super Bear Adventure. 
                    We collect coins, find secrets, and overcome tricky sections. 
                    Enjoy watching!`
            }
        };

        // === ЭЛЕМЕНТЫ СТРАНИЦЫ ===
        const mainTitle = document.getElementById('mainTitle');
        const subtitleText = document.getElementById('subtitleText');
        const descriptionText = document.getElementById('descriptionText');
        const langBtns = document.querySelectorAll('.lang-btn');

        // === ФУНКЦИЯ СМЕНЫ ЯЗЫКА ===
        function setLanguage(lang) {
            // Обновляем контент
            const data = content[lang];
            if (!data) return;

            mainTitle.textContent = data.title;
            subtitleText.textContent = data.subtitle;
            descriptionText.innerHTML = data.description;

            // Обновляем активную кнопку
            langBtns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                }
            });

            // Сохраняем выбор пользователя
            localStorage.setItem('preferred_lang', lang);
        }

        // === ОБРАБОТЧИКИ КЛИКОВ ===
        langBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const lang = this.dataset.lang;
                setLanguage(lang);
            });
        });

        // === ЗАГРУЗКА СОХРАНЁННОГО ЯЗЫКА ===
        const savedLang = localStorage.getItem('preferred_lang');
        if (savedLang && content[savedLang]) {
            setLanguage(savedLang);
        } else {
            // По умолчанию русский (уже активен)
            setLanguage('ru');
        }
    </script>

</body>
</html>
