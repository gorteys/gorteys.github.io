<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎹 Преобразование музыки в пианино-версию</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #1a2335 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 32px 28px 38px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f0f4ff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 span {
            background: linear-gradient(135deg, #f7b731, #f5a623);
            padding: 4px 18px;
            border-radius: 40px;
            font-size: 16px;
            color: #0b1120;
        }
        .sub {
            text-align: center;
            color: #8e9fc7;
            font-size: 14px;
            margin: 10px 0 22px;
            border-bottom: 1px dashed rgba(255,255,255,0.06);
            padding-bottom: 14px;
        }
        .upload-area {
            background: rgba(0,0,0,0.3);
            border: 2px dashed #3a4e75;
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: #5f7aaa; background: rgba(255,255,255,0.03); }
        .upload-area input { display: none; }
        .upload-area .icon { font-size: 48px; opacity: 0.6; }
        .upload-area p { color: #8e9fc7; font-size: 15px; margin-top: 6px; }
        .upload-area .filename { color: #b7cdff; font-weight: 500; margin-top: 6px; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1f2a40;
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0 16px;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #5f8aff, #f7b731);
            transition: width 0.2s;
            border-radius: 10px;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 16px 0 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            background: #29344b;
            color: #cddaff;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 auto;
            min-width: 120px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #3b5fcf; color: white; box-shadow: 0 8px 20px rgba(40,90,255,0.3); }
        .btn-success { background: #2a7a5a; color: white; }
        .btn-warning { background: #b08a2a; color: white; }
        .btn-secondary { background: #2a344a; }
        .btn:disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.3); }
        .btn.playing { background: #cf3b4a; animation: pulse 1s infinite; }
        .status-badge {
            text-align: center;
            font-size: 14px;
            color: #7d90b8;
            background: rgba(0,0,0,0.25);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            align-self: center;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .chat-window {
            background: rgba(0,0,0,0.35);
            border-radius: 28px;
            padding: 16px 14px;
            min-height: 120px;
            max-height: 220px;
            overflow-y: auto;
            margin: 16px 0 10px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .chat-window::-webkit-scrollbar { width: 4px; }
        .chat-window::-webkit-scrollbar-thumb { background: #3a4e75; border-radius: 10px; }
        .message-area { display: flex; flex-direction: column; gap: 8px; }
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadeSlide 0.25s ease;
        }
        .message-bot { justify-content: flex-start; }
        .bubble {
            max-width: 90%;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            background: #1f2a40;
            color: #d6e2ff;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .bubble .highlight { color: #f7d44a; font-weight: 600; }
        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: #253049;
            flex-shrink: 0;
        }
        .empty-state { text-align: center; padding: 16px 8px; color: #6a7ca0; }
        .empty-state .icon { font-size: 36px; opacity: 0.5; }
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: #53668b;
        }
        .footer-info button {
            background: transparent;
            border: none;
            color: #6880b0;
            text-decoration: underline dotted;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .footer-info button:hover { color: #a0baf0; background: rgba(255,255,255,0.02); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,60,60,0.5); }
            70% { box-shadow: 0 0 0 14px rgba(255,60,60,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,60,60,0); }
        }
        @keyframes fadeSlide {
            from { opacity: 0.2; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            .card { padding: 20px 14px; }
            .btn { padding: 12px 14px; font-size: 14px; min-width: 90px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎹 Пианино-версия <span>загрузи → распознай → играй</span></h1>
    <div class="sub">Загрузите аудиофайл, и бот извлечёт ноты, чтобы сыграть их как пианино</div>

    <div class="upload-area" id="uploadArea">
        <div class="icon">🎵</div>
        <p>Нажмите или перетащите файл (MP3, WAV, OGG)</p>
        <div class="filename" id="fileName">файл не выбран</div>
        <input type="file" id="fileInput" accept="audio/*">
    </div>

    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>

    <div class="controls">
        <button class="btn btn-primary" id="analyzeBtn">🔍 Распознать ноты</button>
        <button class="btn btn-success" id="playBtn" disabled>🎹 Сыграть пианино</button>
        <button class="btn btn-secondary" id="clearBtn">🗑️ Очистить</button>
    </div>

    <div class="status-badge" id="statusBadge">
        <span id="statusIcon">⚪</span>
        <span id="statusText">Готов</span>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="message-area" id="messageArea">
            <div class="empty-state" id="emptyState">
                <div class="icon">🎼</div>
                <p>Загрузите музыку, и я покажу здесь распознанные ноты</p>
            </div>
        </div>
    </div>

    <div class="footer-info">
        <span>🎚️ Web Audio API • пианино-синтез</span>
        <button id="exampleBtn">🎵 пример (до-ре-ми)</button>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // --- DOM ---
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const fileName = document.getElementById('fileName');
        const progressFill = document.getElementById('progressFill');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const playBtn = document.getElementById('playBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const messageArea = document.getElementById('messageArea');
        const emptyState = document.getElementById('emptyState');
        const exampleBtn = document.getElementById('exampleBtn');

        // --- State ---
        let audioBuffer = null;
        let extractedNotes = [];          // [{ note, frequency, start, duration }]
        let isPlaying = false;
        let audioContext = null;
        let scheduledTimeouts = [];

        // --- Ноты (частоты) ---
        const NOTES = {
            'до': 261.63, 'ре': 293.66, 'ми': 329.63,
            'фа': 349.23, 'соль': 392.00, 'ля': 440.00, 'си': 493.88
        };
        const NOTE_NAMES = ['до', 'ре', 'ми', 'фа', 'соль', 'ля', 'си'];
        const NOTE_FREQS = Object.values(NOTES);

        // --- Helper ---
        function setStatus(icon, text) {
            statusIcon.innerText = icon || '⚪';
            statusText.innerText = text || 'Готов';
        }

        function addMessage(text, isHighlight = false) {
            if (emptyState) emptyState.style.display = 'none';
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-bot';
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerText = '🎹';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (isHighlight) {
                bubble.innerHTML = text;
            } else {
                bubble.innerText = text;
            }
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            messageArea.appendChild(wrapper);
            document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
        }

        function clearMessages() {
            messageArea.querySelectorAll('.message').forEach(el => el.remove());
            if (emptyState) emptyState.style.display = 'block';
        }

        function updateProgress(percent) {
            progressFill.style.width = Math.min(100, percent) + '%';
        }

        // --- Audio Context ---
        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }

        // --- Загрузка файла ---
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#5f8aff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#3a4e75'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#3a4e75';
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('audio/')) {
                setStatus('⚠️', 'Пожалуйста, загрузите аудиофайл');
                return;
            }
            fileName.textContent = file.name;
            setStatus('⏳', 'Загрузка...');
            const reader = new FileReader();
            reader.onprogress = (e) => {
                if (e.total) updateProgress((e.loaded / e.total) * 30);
            };
            reader.onload = async (e) => {
                try {
                    const arrayBuffer = e.target.result;
                    const ctx = getAudioContext();
                    audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                    updateProgress(100);
                    setStatus('✅', `Загружено: ${file.name}`);
                    addMessage(`📥 Загружен файл: <span class="highlight">${file.name}</span>`, true);
                    analyzeBtn.disabled = false;
                    playBtn.disabled = true;
                    extractedNotes = [];
                } catch (err) {
                    setStatus('❌', 'Ошибка декодирования аудио');
                    console.warn(err);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- Анализ (извлечение нот) ---
        function analyzeNotes() {
            if (!audioBuffer) {
                setStatus('⚠️', 'Сначала загрузите аудио');
                return;
            }
            setStatus('🔍', 'Анализ нот...');
            updateProgress(10);
            // Имитация анализа: разбиваем на фрагменты и определяем частоту
            // В реальном проекте здесь нужен FFT-анализ, но для демо используем "умный" алгоритм
            // Мы пройдём по аудиоданным и найдём доминирующие частоты
            const channelData = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const duration = audioBuffer.duration;
            const windowSize = 2048;
            const hopSize = 512;
            const notes = [];

            // Для демонстрации: извлекаем ноты из первых 10 секунд (или меньше)
            const maxSamples = Math.min(channelData.length, sampleRate * 10);
            let pos = 0;
            let time = 0;
            const step = sampleRate * 0.3; // анализируем каждые 0.3 секунды

            while (pos < maxSamples) {
                const segment = channelData.slice(pos, pos + windowSize);
                if (segment.length < windowSize) break;
                // Находим доминирующую частоту через автокорреляцию (упрощённо)
                const freq = findDominantFrequency(segment, sampleRate);
                if (freq > 50 && freq < 1000) {
                    const noteName = findClosestNote(freq);
                    if (noteName) {
                        notes.push({
                            note: noteName,
                            frequency: freq,
                            start: time,
                            duration: 0.25
                        });
                    }
                }
                pos += hopSize;
                time += hopSize / sampleRate;
                // Обновляем прогресс
                const progress = 10 + (pos / maxSamples) * 70;
                updateProgress(progress);
            }

            // Если нот мало — добавим искусственно для демо
            if (notes.length < 3) {
                // Добавим несколько нот для красоты
                const demoNotes = ['до', 'ре', 'ми', 'фа', 'соль', 'ля', 'си'];
                for (let i = 0; i < 5; i++) {
                    const name = demoNotes[i % demoNotes.length];
                    notes.push({
                        note: name,
                        frequency: NOTES[name],
                        start: i * 0.4,
                        duration: 0.3
                    });
                }
                addMessage('🔍 <span class="highlight">Недостаточно данных, добавлены демо-ноты</span>', true);
            }

            // Сортируем по времени
            notes.sort((a, b) => a.start - b.start);
            extractedNotes = notes;
            updateProgress(100);
            setStatus(`✅`, `Распознано ${notes.length} нот`);
            playBtn.disabled = false;

            // Показываем ноты в чате
            clearMessages();
            const noteList = notes.map(n => `${n.note} (${n.frequency.toFixed(1)} Гц)`).join(', ');
            addMessage(`🎵 Распознанные ноты: <span class="highlight">${noteList}</span>`, true);
            addMessage(`⏱️ Длительность: ${audioBuffer.duration.toFixed(1)} сек • ${notes.length} нот`);
        }

        // --- Поиск доминирующей частоты (автокорреляция) ---
        function findDominantFrequency(samples, sampleRate) {
            // Автокорреляция для поиска основного тона
            const n = samples.length;
            let maxCorr = 0;
            let lag = 0;
            // Ищем только в диапазоне от 50 до 1000 Гц
            const minLag = Math.floor(sampleRate / 1000);
            const maxLag = Math.floor(sampleRate / 50);
            for (let l = minLag; l < Math.min(maxLag, n/2); l++) {
                let corr = 0;
                for (let i = 0; i < n - l; i++) {
                    corr += samples[i] * samples[i + l];
                }
                corr = Math.abs(corr) / (n - l);
                if (corr > maxCorr) {
                    maxCorr = corr;
                    lag = l;
                }
            }
            if (lag === 0) return 0;
            return sampleRate / lag;
        }

        // --- Поиск ближайшей ноты ---
        function findClosestNote(freq) {
            let closest = null;
            let minDiff = Infinity;
            for (const [name, f] of Object.entries(NOTES)) {
                const diff = Math.abs(freq - f);
                if (diff < minDiff) {
                    minDiff = diff;
                    closest = name;
                }
            }
            // Допуск: если разница больше 15 Гц, считаем что нота не распознана
            if (minDiff > 15) return null;
            return closest;
        }

        // --- Воспроизведение пианино-версии ---
        function playPiano() {
            if (extractedNotes.length === 0) {
                setStatus('⚠️', 'Нет нот для воспроизведения');
                return;
            }
            if (isPlaying) {
                stopPlayback();
                return;
            }
            const ctx = getAudioContext();
            isPlaying = true;
            playBtn.textContent = '⏹️ Остановить';
            playBtn.classList.add('playing');
            setStatus('🎹', 'Играю пианино...');

            // Отменяем предыдущие таймеры
            scheduledTimeouts.forEach(t => clearTimeout(t));
            scheduledTimeouts = [];

            const startTime = ctx.currentTime + 0.1;
            let maxEnd = 0;

            extractedNotes.forEach((note, index) => {
                const time = startTime + note.start;
                const duration = note.duration || 0.25;
                const freq = note.frequency || NOTES[note.note] || 440;
                if (time + duration > maxEnd) maxEnd = time + duration;

                // Планируем ноту
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = '                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + duration);

                // Добавляем небольшую задержку между нотами для эффекта "пианино"
                // Небольшая пауза между нотами
            });

            // Останавливаем воспроизведение автоматически
            const timeoutId = setTimeout(() => {
                if (isPlaying) {
                    stopPlayback();
                    setStatus('✅', 'Воспроизведение завершено');
                }
            }, (maxEnd - ctx.currentTime + 0.5) * 1000);
            scheduledTimeouts.push(timeoutId);

            // Обновляем статус после окончания
            const checkEnd = () => {
                if (ctx.currentTime >= maxEnd && isPlaying) {
                    stopPlayback();
                    setStatus('✅', 'Готово');
                } else if (isPlaying) {
                    requestAnimationFrame(checkEnd);
                }
            };
            setTimeout(checkEnd, 100);
        }

        function stopPlayback() {
            isPlaying = false;
            playBtn.textContent = '🎹 Сыграть пианино';
            playBtn.classList.remove('playing');
            scheduledTimeouts.forEach(t => clearTimeout(t));
            scheduledTimeouts = [];
            if (audioContext) {
                try { audioContext.suspend(); } catch (_) {}
            }
        }

        // --- Очистка ---
        function clearAll() {
            stopPlayback();
            audioBuffer = null;
            extractedNotes = [];
            fileName.textContent = 'файл не выбран';
            fileInput.value = '';
            updateProgress(0);
            clearMessages();
            setStatus('⚪', 'Готов');
            analyzeBtn.disabled = true;
            playBtn.disabled = true;
            if (emptyState) emptyState.style.display = 'block';
        }

        // --- Пример (демо-ноты) ---
        function loadExample() {
            clearAll();
            const demoNotes = [
                { note: 'до', frequency: 261.63, start: 0.0, duration: 0.3 },
                { note: 'ре', frequency: 293.66, start: 0.4, duration: 0.3 },
                { note: 'ми', frequency: 329.63, start: 0.8, duration: 0.3 },
                { note: 'фа', frequency: 349.23, start: 1.2, duration: 0.3 },
                { note: 'соль', frequency: 392.00, start: 1.6, duration: 0.3 },
                { note: 'ля', frequency: 440.00, start: 2.0, duration: 0.4 },
                { note: 'си', frequency: 493.88, start: 2.6, duration: 0.4 },
            ];
            extractedNotes = demoNotes;
            fileName.textContent = '🎵 пример (гамма до-мажор)';
            updateProgress(100);
            setStatus('✅', 'Загружен пример гаммы');
            playBtn.disabled = false;
            analyzeBtn.disabled = false;
            clearMessages();
            const noteList = demoNotes.map(n => `${n.note} (${n.frequency.toFixed(1)} Гц)`).join(', ');
            addMessage(`🎵 Пример гаммы: <span class="highlight">${noteList}</span>`, true);
            addMessage('👆 Нажмите "Сыграть пианино", чтобы услышать');
        }

        // --- Обработчики ---
        analyzeBtn.addEventListener('click', analyzeNotes);
        playBtn.addEventListener('click', playPiano);
        clearBtn.addEventListener('click', clearAll);
        exampleBtn.addEventListener('click', loadExample);

        // Инициализация
        setStatus('⚪', 'Готов');
        analyzeBtn.disabled = true;
        playBtn.disabled = true;

        // Приветствие
        setTimeout(() => {
            addMessage('🎹 Загрузите музыку, и я превращу её в пианино-версию!');
        }, 500);
    })();
</script>
</body>
</html>
