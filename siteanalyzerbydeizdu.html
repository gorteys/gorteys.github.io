<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор сайтов (без сервера)</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 700px; background: white; display: flex; flex-direction: column; height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f8f9fa; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #2c3e50; color: white; border-bottom-right-radius: 4px; }
        .msg.bot { align-self: flex-start; background: #ffffff; color: #333; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: white; }
        .input-area input { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 30px; outline: none; font-size: 15px; }
        .input-area button { padding: 14px 24px; background: #2c3e50; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .input-area button:hover { background: #1a252f; }
        .loader { text-align: center; color: #888; font-size: 14px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🔍 Сайт-анализатор (без сервера)</div>
        <div class="messages" id="messageList">
            <div class="msg bot">👋 Привет! Отправь ссылку. Я прочитаю сайт через бесплатный API и перескажу тебе.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Вставьте ссылку..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const list = document.getElementById('messageList');
            
            // Сообщение пользователя
            list.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            list.scrollTop = list.scrollHeight;

            // Загрузка
            const loader = document.createElement('div');
            loader.className = 'loader';
            loader.innerText = '⏳ Загружаю и анализирую сайт через API...';
            list.appendChild(loader);
            list.scrollTop = list.scrollHeight;

            try {
                // Используем бесплатный сервис r.jina.ai для чтения сайта
                // Он скачивает сайт и возвращает только чистый текст
                const response = await fetch(`https://r.jina.ai/${text}`);
                
                if (!response.ok) {
                    throw new Error(`Сайт вернул ошибку: ${response.status}`);
                }
                
                const rawText = await response.text();
                
                // Простая обработка текста: обрезаем, если слишком длинный
                let finalText = rawText;
                if (finalText.length > 3500) {
                    finalText = finalText.substring(0, 3500) + "\n\n... (текст сокращён, так как слишком длинный)";
                }

                // Убираем загрузку и показываем ответ
                loader.remove();
                list.innerHTML += `<div class="msg bot">${finalText}</div>`;
                list.scrollTop = list.scrollHeight;

            } catch (error) {
                loader.remove();
                list.innerHTML += `<div class="msg bot">❌ Ошибка: ${error.message}. Проверьте ссылку или попробуйте позже.</div>`;
            }
        }

        function handleKey(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
