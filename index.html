<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Spotify Web Audio Vocal Remover</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0f;
  color: white;
  display: flex;
  height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  background: #000;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #1db954;
}

.nav-item {
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  cursor: pointer;
  color: #aaa;
  transition: 0.2s;
}

.nav-item:hover {
  background: #1a1a1a;
  color: white;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ===== TOP BAR ===== */
.topbar {
  background: #121212;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.search {
  background: #242424;
  border: none;
  padding: 10px;
  border-radius: 20px;
  width: 300px;
  color: white;
}

/* ===== CONTENT ===== */
.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.card {
  background: #181818;
  padding: 15px;
  border-radius: 10px;
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  background: #282828;
  transform: scale(1.03);
}

/* ===== PLAYER ===== */
.player {
  height: 80px;
  background: #181818;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-top: 1px solid #333;
}

/* ===== BUTTONS ===== */
button {
  background: #1db954;
  border: none;
  padding: 10px 14px;
  border-radius: 20px;
  cursor: pointer;
  color: black;
  font-weight: bold;
  margin: 5px;
  transition: 0.2s;
}

button:hover {
  background: #1ed760;
  transform: scale(1.05);
}

input[type="file"] {
  color: white;
}
</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="logo">🎧 Gorteys Audio</div>

  <div class="nav-item">🏠 Home</div>
  <div class="nav-item">🔎 Search</div>
  <div class="nav-item">📚 Library</div>
  <div class="nav-item" onclick="goWiki()">📖 Wiki</div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- TOP -->
  <div class="topbar">
    <input class="search" placeholder="Search music...">
    <input type="file" id="file" accept="audio/*">
  </div>

  <!-- CONTENT -->
  <div class="content">
    <h2>🔥 Your Audio Tools</h2>

    <div class="cards">
      <div class="card" onclick="playOriginal()">▶ Original</div>
      <div class="card" onclick="processAndPlay()">🎤 Remove Vocals</div>
      <div class="card" onclick="downloadWav()">⬇ Download</div>
    </div>

    <h3 style="margin-top:20px;">🎚 Controls</h3>
    <button onclick="playOriginal()">▶ Play</button>
    <button onclick="processAndPlay()">🎤 Remove Vocals</button>
    <button onclick="downloadWav()">⬇ Export WAV</button>
  </div>

</div>

<!-- ===== PLAYER ===== -->
<div class="player">
  <div>🎵 Now Playing</div>
  <div>
    <button onclick="playOriginal()">▶</button>
    <button onclick="processAndPlay()">🎤</button>
  </div>
</div>

<script>

let ctx;
let originalBuffer;
let processedBuffer;

document.getElementById("file").addEventListener("change", async (e) => {
  const file = e.target.files[0];

  ctx = new (window.AudioContext || window.webkitAudioContext)();

  const arrayBuffer = await file.arrayBuffer();
  originalBuffer = await ctx.decodeAudioData(arrayBuffer);

  alert("🎧 Аудио загружено!");
});

function playBuffer(buffer) {
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  src.connect(ctx.destination);
  src.start();
}

function playOriginal() {
  if (!originalBuffer) return alert("Загрузи файл!");
  playBuffer(originalBuffer);
}

function processAndPlay() {
  if (!originalBuffer) return alert("Загрузи файл!");
  processedBuffer = vocalRemove(originalBuffer);
  playBuffer(processedBuffer);
}

/* ===== VOCAL REMOVER ===== */
function vocalRemove(buffer) {
  const length = buffer.length;
  const sampleRate = buffer.sampleRate;

  const output = ctx.createBuffer(2, length, sampleRate);

  const L = buffer.getChannelData(0);
  const R = buffer.getChannelData(1);

  const outL = output.getChannelData(0);
  const outR = output.getChannelData(1);

  let prev = 0;

  for (let i = 0; i < length; i++) {

    let mid = (L[i] + R[i]) * 0.5;
    let side = (L[i] - R[i]) * 0.5;

    // simple high-pass
    const alpha = 0.95;
    side = alpha * (prev + side - (prev || 0));
    prev = side;

    // mid cut
    side *= 0.7;

    outL[i] = side;
    outR[i] = -side;
  }

  return output;
}

/* ===== WAV EXPORT ===== */
function downloadWav() {
  if (!processedBuffer) return alert("Сначала обработай звук!");

  const buffer = processedBuffer;

  const numCh = buffer.numberOfChannels;
  const length = buffer.length * numCh * 2 + 44;

  const wav = new ArrayBuffer(length);
  const view = new DataView(wav);

  const write = (o,s)=>{
    for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i));
  };

  write(0,'RIFF');
  view.setUint32(4,36 + buffer.length*numCh*2,true);
  write(8,'WAVE');
  write(12,'fmt ');
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,numCh,true);
  view.setUint32(24,buffer.sampleRate,true);
  view.setUint32(28,buffer.sampleRate*numCh*2,true);
  view.setUint16(32,numCh*2,true);
  view.setUint16(34,16,true);
  write(36,'data');
  view.setUint32(40,buffer.length*numCh*2,true);

  let offset = 44;

  for(let i=0;i<buffer.length;i++){
    for(let ch=0;ch<numCh;ch++){
      let sample = buffer.getChannelData(ch)[i];
      sample = Math.max(-1,Math.min(1,sample));
      view.setInt16(offset, sample*0x7FFF,true);
      offset+=2;
    }
  }

  const blob = new Blob([wav], {type:"audio/wav"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "no_vocals.wav";
  a.click();
}

/* ===== WIKI ===== */
function goWiki() {
  window.location.href = "/wiki/wiki.html";
}

</script>

</body>
</html>
