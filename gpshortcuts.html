<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Shortcuts — Google Play</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 760px; width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 10px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.04);
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin-bottom: 30px; padding-bottom: 16px;
            border-bottom: 1px solid #e8eaed; flex-wrap: wrap;
        }
        .google-logo {
            display: flex; align-items: center; gap: 0px;
            text-decoration: none;
        }
        .google-logo .g1 { color: #4285f4; font-weight: 600; font-size: 1.8rem; line-height: 1; }
        .google-logo .g2 { color: #ea4335; font-weight: 600; font-size: 1.8rem; line-height: 1; }
        .google-logo .g3 { color: #fbbc05; font-weight: 600; font-size: 1.8rem; line-height: 1; }
        .google-logo .g4 { color: #4285f4; font-weight: 600; font-size: 1.8rem; line-height: 1; }
        .google-logo .g5 { color: #34a853; font-weight: 600; font-size: 1.8rem; line-height: 1; }
        .google-logo .g6 { color: #ea4335; font-weight: 600; font-size: 1.8rem; line-height: 1; }
        .brand-text { font-size: 1.3rem; font-weight: 500; color: #202124; margin-left: 10px; }
        .brand-sub { color: #5f6368; font-size: 0.9rem; font-weight: 400; margin-left: 6px; }
        .lang-switch { display: flex; gap: 6px; }
        .lang-btn {
            background: transparent; border: 1px solid #dadce0; color: #5f6368;
            padding: 4px 12px; border-radius: 30px; font-size: 0.75rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .lang-btn:hover { border-color: #4285f4; color: #4285f4; }
        .lang-btn.active { background: #4285f4; border-color: #4285f4; color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card {
            background: #ffffff; border-radius: 24px; padding: 24px 20px 28px;
            text-align: center; text-decoration: none; color: #202124;
            border: 1px solid #e8eaed; transition: all 0.25s ease;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .card:hover { transform: translateY(-6px); border-color: #4285f4; box-shadow: 0 12px 40px rgba(66, 133, 244, 0.12); }
        .card .icon-wrapper { width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; margin-bottom: 16px; background: #f1f3f4; }
        .card .icon-wrapper.gd { background: #e3f2fd; color: #1a73e8; }
        .card .icon-wrapper.sba { background: #e8f5e9; color: #2e7d32; }
        .card .icon-wrapper.ai { background: #fce4ec; color: #c62828; }
        .card .icon-wrapper.ds { background: #e8eaf6; color: #283593; }
        .card .title { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
        .card .subtitle { font-size: 0.85rem; color: #5f6368; margin-bottom: 12px; }
        .card .badge { display: inline-block; background: #e8eaed; color: #5f6368; padding: 4px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 500; }
        .card .badge.play { background: #4285f4; color: white; }
        .footer { margin-top: 32px; text-align: center; color: #9aa0a6; font-size: 0.8rem; border-top: 1px solid #e8eaed; padding-top: 20px; }
        .footer a { color: #4285f4; text-decoration: none; }
        @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } .container { padding: 24px 16px; } .header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://www.google.com" target="_blank" class="google-logo">
                <!-- Текстовый логотип Google с правильными цветами -->
                <span class="g1">G</span><span class="g2">o</span><span class="g3">o</span><span class="g4">g</span><span class="g5">l</span><span class="g6">e</span>
                <span class="brand-text" data-key="brand">APK Shortcuts</span>
                <span class="brand-sub" data-key="brand_sub">• Google Play</span>
            </a>
            <div class="lang-switch">
                <button class="lang-btn" data-lang="cn">🇨🇳 中文</button>
                <button class="lang-btn active" data-lang="ru">🇷🇺 RU</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
            </div>
        </div>

        <div class="grid">
            <!-- ChatGPT (Play Store) -->
            <a href="https://play.google.com/store/apps/details?id=com.openai.chatgpt" target="_blank" class="card">
                <div class="icon-wrapper ai">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h-2V5.73C10.4 5.39 10 4.74 10 4a2 2 0 0 1 2-2Z"/>
                        <path d="M12 22a2 2 0 0 1-2-2c0-.74.4-1.39 1-1.73V17h2v1.27c.6.34 1 .99 1 1.73a2 2 0 0 1-2 2Z"/>
                        <path d="M2 12a2 2 0 0 1 2-2c.74 0 1.39.4 1.73 1H7v2H5.73C5.39 13.6 4.74 14 4 14a2 2 0 0 1-2-2Z"/>
                        <path d="M22 12a2 2 0 0 1-2 2c-.74 0-1.39-.4-1.73-1H17v-2h1.27c.34-.6.99-1 1.73-1a2 2 0 0 1 2 2Z"/>
                        <path d="M14.5 9.5 11 12l3.5 2.5L18 12l-3.5-2.5Z"/>
                    </svg>
                </div>
                <div class="title" data-key="chat_title">ChatGPT</div>
                <div class="subtitle" data-key="chat_sub">OpenAI</div>
                <span class="badge play" data-key="chat_badge">Открыть в Play</span>
            </a>

            <!-- DeepSeek (Play Store) -->
            <a href="https://play.google.com/store/apps/details?id=com.deepseek.chat" target="_blank" class="card">
                <div class="icon-wrapper ds">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 12h8"/>
                        <path d="M12 8v8"/>
                    </svg>
                </div>
                <div class="title" data-key="ds_title">DeepSeek</div>
                <div class="subtitle" data-key="ds_sub">DeepSeek AI</div>
                <span class="badge play" data-key="ds_badge">Открыть в Play</span>
            </a>

            <!-- Geometry Dash (Play Store) -->
            <a href="https://play.google.com/store/apps/details?id=com.robtopx.geometrydash" target="_blank" class="card">
                <div class="icon-wrapper gd">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </div>
                <div class="title" data-key="gd_title">Geometry Dash</div>
                <div class="subtitle" data-key="gd_sub">RobTop Games</div>
                <span class="badge play" data-key="gd_badge">Открыть в Play</span>
            </a>

            <!-- Super Bear Adventure (Play Store) -->
            <a href="https://play.google.com/store/apps/details?id=com.Earthkwak.Platformer" target="_blank" class="card">
                <div class="icon-wrapper sba">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="title" data-key="sba_title">Super Bear Adventure</div>
                <div class="subtitle" data-key="sba_sub">Earthkwak Games</div>
                <span class="badge play" data-key="sba_badge">Открыть в Play</span>
            </a>
        </div>

        <div class="footer">
            <p data-key="footer">Google App's APK Shortcuts • <a href="https://play.google.com" target="_blank">play.google.com</a></p>
        </div>
    </div>

    <script>
        const translations = {
            ru: { brand: "APK Shortcuts", brand_sub: "• Google Play", chat_title: "ChatGPT", chat_sub: "OpenAI", chat_badge: "Открыть в Play", ds_title: "DeepSeek", ds_sub: "DeepSeek AI", ds_badge: "Открыть в Play", gd_title: "Geometry Dash", gd_sub: "RobTop Games", gd_badge: "Открыть в Play", sba_title: "Super Bear Adventure", sba_sub: "Earthkwak Games", sba_badge: "Открыть в Play", footer: "Google App's APK Shortcuts • play.google.com" },
            en: { brand: "APK Shortcuts", brand_sub: "• Google Play", chat_title: "ChatGPT", chat_sub: "OpenAI", chat_badge: "Open in Play", ds_title: "DeepSeek", ds_sub: "DeepSeek AI", ds_badge: "Open in Play", gd_title: "Geometry Dash", gd_sub: "RobTop Games", gd_badge: "Open in Play", sba_title: "Super Bear Adventure", sba_sub: "Earthkwak Games", sba_badge: "Open in Play", footer: "Google App's APK Shortcuts • play.google.com" },
            cn: { brand: "APK 快捷方式", brand_sub: "• Google Play", chat_title: "ChatGPT", chat_sub: "OpenAI", chat_badge: "在 Play 中打开", ds_title: "DeepSeek", ds_sub: "DeepSeek AI", ds_badge: "在 Play 中打开", gd_title: "几何冲刺", gd_sub: "RobTop Games", gd_badge: "在 Play 中打开", sba_title: "超级熊冒险", sba_sub: "Earthkwak Games", sba_badge: "在 Play 中打开", footer: "Google App 的 APK 快捷方式 • play.google.com" }
        };

        let currentLang = 'ru';
        function setLanguage(lang) {
            currentLang = lang; const data = translations[lang];
            document.querySelectorAll('[data-key]').forEach(el => { const key = el.getAttribute('data-key'); if (data[key] !== undefined) el.textContent = data[key]; });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
            localStorage.setItem('apk_lang', lang);
        }
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });
        const savedLang = localStorage.getItem('apk_lang');
        if (savedLang && translations[savedLang]) setLanguage(savedLang);
        else setLanguage('ru');
    </script>
</body>
</html>
